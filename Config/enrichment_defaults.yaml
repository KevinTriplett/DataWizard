  harvest_depth: standard
  lexicon_scan: true
  speaker_attribution: false
  cross_reference: true
  url_extraction: true
  segment: false

podcast-transcript:
  harvest_depth: standard
  lexicon_scan: true
  speaker_attribution: true
  cross_reference: true
  url_extraction: true
  segment: true

video-transcript:
  harvest_depth: standard
  lexicon_scan: true
  speaker_attribution: true
  cross_reference: true
  url_extraction: true
  segment: true

meeting-transcript:
  harvest_depth: light
  lexicon_scan: false
  speaker_attribution: true
  cross_reference: false
  url_extraction: false
  segment: true

voice-memo-transcript:
  harvest_depth: light
  lexicon_scan: false
  speaker_attribution: false
  cross_reference: false
  url_extraction: false
  segment: true

seedpod:
