# Enrichment Pipeline Default Policies
# Each type maps to its baseline enrichment policy.
# Absent types fall through to _default.
#
# Fields:
#   harvest_depth: deep | standard | light
#   lexicon_scan: true | false
#   speaker_attribution: true | false
#   cross_reference: true | false
#   url_extraction: true | false
#   segment: true | false
#
# Design doc: Workshop/Design/Enrichment Policy YAML Schema.md
# Created: DW-S133 2026-05-31
#
# Instance-local types (e.g. reddit-save) do NOT belong in this shipped
# file (D89). Their policies live in the instance taxonomy overlay - see
# Seed/Config/taxonomy.yaml `overlay` section. Updated: DW-S178 2026-06-12

_default:
  harvest_depth: standard
  lexicon_scan: true
  speaker_attribution: false
  cross_reference: true
  url_extraction: true
  segment: false

