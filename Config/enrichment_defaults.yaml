# Signal override rules (processed in order, each can override specific fields)
# Conditions are evaluated against source file YAML + content properties.
# Explicit enrichment_policy: fields on the source file override everything.
signal_overrides:
  - condition: "highlighted_by_hand == true"
    override:
      harvest_depth: deep

  - condition: "priority == high"
    override:
      harvest_depth: deep

  - condition: "word_count > 10000"
    override:
      segment: true

  - condition: "harvest_for length > 1"
    override:
      cross_reference: true
